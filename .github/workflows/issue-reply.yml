name: Issue Reply

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  issue-reply:
    if: github.repository == 'taroify/taroify'
    runs-on: ubuntu-latest
    steps:
      - name: Need Reproduce
        if: github.event.label.name == 'need reproduction'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `你好 @${context.payload.issue.user.login}, 我们需要你提供一个在线的重现实例以便于我们帮你排查问题。你可以通过点击 [此处](https://codesandbox.io/s/taroify-template-t2fjh) 创建一个 codesandbox 或者提供一个最小化的 GitHub 仓库。请确保选择准确的版本。`,
            })
