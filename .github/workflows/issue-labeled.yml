name: Issue Labeled

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  reply-labeled:
    if: github.repository == 'taroify/taroify'
    runs-on: ubuntu-latest
    steps:
      - name: contribution welcome
        if: github.event.label.name == 'contribution welcome' || github.event.label.name == 'help wanted'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            }

            await github.rest.issues.createComment({
              ...issue,
              body: `你好 @${context.payload.issue.user.login}。我们喜欢您的建议/反馈，并希望您或其他社区成员通过Pull Request做出贡献。我们提前感谢您的贡献，并期待着审阅！`,
            })

            for (const name of ['pending triage', 'need reproduction']) {
              try {
                await github.rest.issues.removeLabel({ ...issue, name })
              } catch (error) {
                if (error.status !== 404) throw error
              }
            }

      - name: remove pending
        if: github.event.label.name == 'enhancement' || github.event.label.name == 'bug' || (contains(github.event.label.name, 'pending triage') == false && startsWith(github.event.label.name, 'bug:') == true)
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'pending triage',
              })
            } catch (error) {
              if (error.status !== 404) throw error
            }

      - name: need reproduction
        if: github.event.label.name == 'need reproduction'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            }

            await github.rest.issues.createComment({
              ...issue,
              body: `你好 @${context.payload.issue.user.login}。请提供[最小复制](https://stackoverflow.com/help/minimal-reproducible-example)使用GitHub存储库或点击[此处](https://codesandbox.io/s/taroify-template-t2fjh). 标有“need reproduction”的问题如果在3天内没有活动，将被关闭。`,
            })

            try {
              await github.rest.issues.removeLabel({
                ...issue,
                name: 'pending triage',
              })
            } catch (error) {
              if (error.status !== 404) throw error
            }
