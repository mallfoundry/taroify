name: Deploy Site

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20.19.0"

jobs:
  build-and-deploy:
    if: github.repository == 'taroify/taroify'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install Dependencies
        run: |
          yarn install --frozen-lockfile
          yarn --cwd site install --frozen-lockfile --ignore-scripts

      - name: Run Build Site
        run: yarn run build:www

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        env:
          LEFTHOOK: "0"
        with:
          branch: gh-pages
          folder: bundles/www
          token: ${{ secrets.TAROIFY_SITE_TOKEN }}
          repository-name: taroify/taroify.com
          single-commit: true
          clean: true
